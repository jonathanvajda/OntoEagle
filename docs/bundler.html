<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="./images/block-logo.png">
    <title>Ontology Bundler</title>
    <!-- Public CSS -->
    <link rel="stylesheet" href="./styles/skeleton.css" />  
    <!-- App Global CSS -->
    <script>
        (function () {
        const APPBASE_CSS_SOURCES = [
            "./styles/app-base.css", /* local dev copy first */
            "https://jonathanvajda.github.io/OntoEagle/styles/app-base.css",
            "https://jonathanvajda.github.io/table-nova/styles/app-base.css",
        ];

        function loadCss(href) {
            return new Promise((resolve, reject) => {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = href;

            link.onload = () => resolve(href);
            link.onerror = () => reject(new Error("CSS failed: " + href));

            document.head.appendChild(link);
            });
        }

        function showFailure(msg) {
            console.error(msg);
            // Optional user-visible banner
            const style = document.createElement("style");
            style.textContent =
            ".asset-fail-banner{position:fixed;left:0;right:0;top:0;z-index:9999;" +
            "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
            "border-bottom:1px solid rgba(0,0,0,.2)}";
            document.head.appendChild(style);

            const div = document.createElement("div");
            div.className = "asset-fail-banner";
            div.textContent = msg;
            document.body ? document.body.prepend(div) : document.addEventListener("DOMContentLoaded", () => document.body.prepend(div));
        }

        (async () => {
            for (const href of APPBASE_CSS_SOURCES) {
            try { await loadCss(href); return; } catch (_) {}
            }
            showFailure("Failed to load app base CSS from all sources.");
        })();
        })();
    </script>
    <script>
        (function () {
        const HEADER_CSS_SOURCES = [
            "./styles/site-header.css", /* local dev copy first */
            "https://jonathanvajda.github.io/OntoEagle/styles/site-header.css",
            "https://jonathanvajda.github.io/table-nova/styles/site-header.css",
        ];

        function loadCss(href) {
            return new Promise((resolve, reject) => {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = href;

            link.onload = () => resolve(href);
            link.onerror = () => reject(new Error("CSS failed: " + href));

            document.head.appendChild(link);
            });
        }

        function showFailure(msg) {
            console.error(msg);
            // Optional user-visible banner
            const style = document.createElement("style");
            style.textContent =
            ".asset-fail-banner{position:fixed;left:0;right:0;top:0;z-index:9999;" +
            "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
            "border-bottom:1px solid rgba(0,0,0,.2)}";
            document.head.appendChild(style);

            const div = document.createElement("div");
            div.className = "asset-fail-banner";
            div.textContent = msg;
            document.body ? document.body.prepend(div) : document.addEventListener("DOMContentLoaded", () => document.body.prepend(div));
        }

        (async () => {
            for (const href of HEADER_CSS_SOURCES) {
            try { await loadCss(href); return; } catch (_) {}
            }
            showFailure("Failed to load header CSS from all sources.");
        })();
        })();
    </script>
    <link rel="stylesheet" href="styles/bundler.css" />

  </head>

  <body data-page-id="ontoeagle">
    <header id="siteHeader" class="sitehdr-root" role="banner" aria-label="Site header">
    
    </header>

    <main id="bundler-app">
        <h2>Resource Bundles</h2>
        <div id="app" class="grid" style="background: var(--ont-emph-bg);"></div>

        <div id="manage-bundles">
        <h3>Make Slim</h3>
        <label>
            Export bundle:
            <select id="selExportBundle"></select>
        </label>
        <label>
            <input type="checkbox" id="chkIncludeLabels" checked style="height: 13px;" />
            include <code># label</code>
        </label>
        <button id="btnExportSeed" type="button">Export ROBOT seed (.txt)</button>

        <h3>Manage Bundles</h3>
        
        <button id="btnCreateBundle" type="button">Create bundle</button><br />

        <!-- div display none unless debugging -->
        <div style="display: none">        <label>
                    Merge bundles:
                    <select id="selMergeA"></select>
                    +
                    <select id="selMergeB"></select>
                </label>
                <button id="btnMerge" type="button">Merge → new bundle</button><br />
                <button id="btnClear" type="button">Empty all bundles</button><br />
        </div>
        <!-- Debugging -->
        <button id="btnSeedExample" class="debugging-element" type="button">Seed example item + bundle</button>
        </div>

        <h3 class="debugging-element">Raw JSON-LD (for debugging)</h3>
        <textarea id="txtRaw" class="debugging-element" readonly></textarea>
    </main>

    <!-- Header JS -->
    <script>
        (function () {
        const JS_SOURCES = [
            "./app/site-header.js", /* local dev copy first */
            "https://jonathanvajda.github.io/OntoEagle/app/site-header.js",
            "https://jonathanvajda.github.io/table-nova/app/site-header.js",
        ];

        function loadScript(src) {
            return new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.defer = true;

            s.onload = () => resolve(src);
            s.onerror = () => reject(new Error("JS failed: " + src));

            document.head.appendChild(s);
            });
        }

        function showFailure(msg) {
            console.error(msg);
            const div = document.createElement("div");
            div.style.cssText =
            "position:fixed;left:0;right:0;bottom:0;z-index:9999;" +
            "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
            "border-top:1px solid rgba(0,0,0,.2)";
            div.textContent = msg;
            document.body ? document.body.appendChild(div) : document.addEventListener("DOMContentLoaded", () => document.body.appendChild(div));
        }

        (async () => {
            for (const src of JS_SOURCES) {
            try { await loadScript(src); return; } catch (_) {}
            }
            showFailure("Failed to load header JavaScript from all sources.");
        })();
        })();
    </script>
    <!-- App JS -->
    <script type="module" src="./app/bundler.js"></script>
  </body>
</html>
